apiVersion: apps/v1
kind: Deployment
metadata:
  name: project4
  labels:
    app: project4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project4
  template:
    metadata:
      name: project4
      labels:
        app: project4
    spec:
      containers:
        - name: project4
          image: melay/project4:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              protocol: TCP
      restartPolicy: Always
      